name: Daily Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9:00 AM UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update File - 23f3000015@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit Changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f3000015@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit"
          git push
