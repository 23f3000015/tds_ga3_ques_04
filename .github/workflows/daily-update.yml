name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '15 8 * * *'   # Runs daily at 08:15 UTC (specific time, no wildcards)
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Update File - 23f3000015@ds.study.iitm.ac.in
        run: |
          echo "Updated on $(date)" >> daily-log.txt

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "23f3000015@ds.study.iitm.ac.in"
          git add .
          git commit -m "Automated daily commit" || echo "No changes"
          git push
